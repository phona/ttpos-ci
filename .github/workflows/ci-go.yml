name: CI (Go)

on:
  repository_dispatch:
    types: [ci-go]

concurrency:
  group: ci-${{ github.event.client_payload.source_repo }}-${{ github.event.client_payload.pr_number }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════
  # 初始化：读取源码仓库的 CI 配置
  # ═══════════════════════════════════════════════════
  init:
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.env.outputs.GO_VERSION }}
      needs_docker: ${{ steps.env.outputs.NEEDS_DOCKER }}
      needs_submodules: ${{ steps.env.outputs.NEEDS_SUBMODULES }}
      base_rev: ${{ steps.base.outputs.BASE_REV }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Read CI env
        id: env
        run: |
          if make ci-env > /dev/null 2>&1; then
            make ci-env >> $GITHUB_OUTPUT
          fi

      - name: Compute merge base
        id: base
        if: github.event.client_payload.pr_number != ''
        env:
          BASE_REF: ${{ github.event.client_payload.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          echo "BASE_REV=$(git merge-base FETCH_HEAD HEAD)" >> $GITHUB_OUTPUT

      - name: Create pending statuses
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const payload = context.payload.client_payload;
            const [owner, repo] = payload.source_repo.split('/');
            const checks = ['lint', 'unit-test', 'integration-test', 'sonarqube', 'image-publish'];
            for (const name of checks) {
              await github.rest.repos.createCommitStatus({
                owner, repo,
                sha: payload.sha,
                state: 'pending',
                context: `CI / ${name}`,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }

  # ═══════════════════════════════════════════════════
  # Lint / Unit Test / Integration Test — 全部并发
  # ═══════════════════════════════════════════════════
  lint:
    needs: [init]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: ${{ needs.init.outputs.needs_submodules == 'true' }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.init.outputs.go_version }}
          cache-dependency-path: '**/go.sum'

      - name: Setup
        run: make ci-setup || true

      - name: Lint
        env:
          BASE_REV: ${{ needs.init.outputs.base_rev }}
        run: make ci-lint

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / lint',
              description: 'Lint ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  unit-test:
    needs: [init]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: ${{ needs.init.outputs.needs_submodules == 'true' }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.init.outputs.go_version }}
          cache-dependency-path: '**/go.sum'

      - name: Setup
        run: make ci-setup || true

      - name: Unit Tests
        run: make ci-unit-test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 3

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / unit-test',
              description: 'Unit Test ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  integration-test:
    needs: [init]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.init.outputs.go_version }}
          cache-dependency-path: '**/go.sum'

      - name: Docker Login
        if: needs.init.outputs.needs_docker == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Integration Tests
        env:
          BUILD_ID: ${{ github.run_id }}
        run: make ci-integration-test BUILD_ID="$BUILD_ID"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage/
          retention-days: 3

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / integration-test',
              description: 'Integration Test ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  # ═══════════════════════════════════════════════════
  # SonarQube — 等所有并发任务完成后运行
  # ═══════════════════════════════════════════════════
  sonarqube:
    needs: [lint, unit-test, integration-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: coverage/

      - name: Merge coverage
        run: |
          shopt -s nullglob
          out_files=(coverage/**/*.out)
          shopt -u nullglob
          if [[ ${#out_files[@]} -eq 0 ]]; then
            echo "mode: set" > coverage/final.out
            exit 0
          fi
          first_file=""
          for f in "${out_files[@]}"; do
            [[ "$f" != *"final.out" ]] && first_file="$f" && break
          done
          if [[ -n "$first_file" ]]; then
            head -1 "$first_file" > coverage/final.out
            for f in "${out_files[@]}"; do
              [[ "$f" != *"final.out" ]] && tail -n +2 "$f" >> coverage/final.out
            done
          else
            echo "mode: set" > coverage/final.out
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        with:
          args: >
            -Dproject.settings=sonar-project.properties
            -Dsonar.go.coverage.reportPaths=coverage/final.out
            -Dsonar.scm.revision=${{ github.event.client_payload.sha }}
            -Dsonar.pullrequest.key=${{ github.event.client_payload.pr_number }}
            -Dsonar.pullrequest.branch=${{ github.event.client_payload.head_ref }}
            -Dsonar.pullrequest.base=${{ github.event.client_payload.base_ref }}

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / sonarqube',
              description: 'SonarQube ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  # ═══════════════════════════════════════════════════
  # Image Publish — 所有 quality gate 全绿后才跑
  #   build image + push 到 ghcr.io；tag 写回 commit status description 给 sisyphus 读
  # ═══════════════════════════════════════════════════
  image-publish:
    needs: [lint, unit-test, integration-test, sonarqube]
    runs-on: ubuntu-latest
    # 只有前面 4 个 job 全 success 才跑；任一失败 image-publish skip
    if: |
      needs.lint.result == 'success' &&
      needs.unit-test.result == 'success' &&
      needs.integration-test.result == 'success' &&
      needs.sonarqube.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: ${{ needs.init.outputs.needs_submodules == 'true' }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.init.outputs.go_version }}
          cache-dependency-path: '**/go.sum'

      - name: Compute image tag
        id: tag
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SHA: ${{ github.event.client_payload.sha }}
          HEAD_REF: ${{ github.event.client_payload.head_ref }}
        run: |
          SHORT_SHA="${SHA:0:8}"
          # 从 branch 名抽 REQ-N（约定：stage/REQ-<id>-dev）
          REQ_ID=$(echo "$HEAD_REF" | grep -oE 'REQ-[0-9A-Za-z_-]+' | head -1 || true)
          if [ -z "$REQ_ID" ]; then REQ_ID="nonreq-${SHA:0:8}"; fi
          IMAGE_TAG="ghcr.io/${SOURCE_REPO,,}:${REQ_ID}-sha-${SHORT_SHA}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "req_id=$REQ_ID" >> $GITHUB_OUTPUT

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Build + push image
        env:
          SISYPHUS_IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          BUILD_ID: ${{ github.run_id }}
        run: make ci-build

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            // description 里放 image_tag 给 sisyphus pr-ci-watch agent 直接解析
            const desc = state === 'success'
              ? '${{ steps.tag.outputs.image_tag }}'
              : 'Image publish ${{ job.status }}';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / image-publish',
              description: desc,
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  # ═══════════════════════════════════════════════════
  # CI 通过后自动触发 Build
  # ═══════════════════════════════════════════════════
  trigger-build:
    needs: [image-publish]
    runs-on: ubuntu-latest
    if: needs.image-publish.result == 'success'
    steps:
      - name: Trigger build workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build.yml \
            --repo ${{ github.repository }} \
            -f source_repo="${{ github.event.client_payload.source_repo }}" \
            -f sha="${{ github.event.client_payload.sha }}" \
            -f ref_name="${{ github.event.client_payload.ref_name }}"
