name: Build

on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repo (owner/repo)'
        required: true
        default: 'zoneasetech/ttpos-server-go'
      sha:
        description: 'Commit SHA or branch'
        required: true
        default: 'main'
      ref_name:
        description: 'Ref name (branch or tag)'
        required: true
        default: 'main'
      version:
        description: 'Optional image tag override (empty = auto)'
        required: false
        default: ''
      images:
        description: 'Images to build (JSON array, empty = all)'
        required: false
        default: '[]'

concurrency:
  group: build-${{ github.event.client_payload.sha || github.event.inputs.sha }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════
  # 从 payload 读取镜像列表，供 matrix 使用
  # ═══════════════════════════════════════════════════
  init:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set.outputs.images }}
    env:
      # toJSON 将 YAML 数组安全转为 JSON 字符串，避免 shell 插值问题
      RAW: ${{ toJSON(github.event.client_payload.images || github.event.inputs.images || '[]') }}
    steps:
      - name: Parse image list from payload
        id: set
        run: |
          IMAGES=$(echo "$RAW" | jq -c 'if type == "array" then . else [] end')
          # 空数组 → 由源仓库的 ci-build.sh 自行决定（传空 IMAGE 变量即可）
          if [ "$IMAGES" = '[]' ] || [ -z "$IMAGES" ]; then
            IMAGES='[""]'
          fi
          echo "images=$IMAGES" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════
  # 矩阵构建：每个镜像独立 runner
  # ═══════════════════════════════════════════════════
  build:
    needs: [init]
    name: Build ${{ matrix.image || 'all' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.init.outputs.images) }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo || github.event.inputs.source_repo }}
          ref: ${{ github.event.client_payload.sha || github.event.inputs.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: true

      - name: Read CI env
        id: env
        run: |
          if make ci-env > /dev/null 2>&1; then
            make ci-env >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        if: steps.env.outputs.GO_VERSION != ''
        with:
          go-version: ${{ steps.env.outputs.GO_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.event.client_payload.actor || secrets.DOCKER_USERNAME }}
          password: ${{ github.event.client_payload.github_token || secrets.DOCKER_PASSWORD }}

      - name: Build and push
        env:
          IMAGE: ${{ matrix.image }}
          CACHE: "1"
          REF_NAME: ${{ github.event.client_payload.ref_name || github.event.inputs.ref_name }}
          SHA: ${{ github.event.client_payload.sha || github.event.inputs.sha }}
          EVENT_NAME: ${{ github.event.client_payload.event_name || github.event_name }}
          VERSION: ${{ github.event.client_payload.version || github.event.inputs.version || '' }}
        run: |
          sanitize_ref() {
            local ref="$1"
            ref="$(printf '%s' "$ref" | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[^A-Za-z0-9_]+//; s/-+/-/g')"
            ref="${ref:0:120}"
            printf '%s' "${ref:-ref}"
          }

          if [ -z "$VERSION" ]; then
            if [ "$EVENT_NAME" = "push" ]; then
              VERSION="$REF_NAME"
            else
              SHORT_SHA="$(git rev-parse --short HEAD)"
              VERSION="$(sanitize_ref "$REF_NAME")-${SHORT_SHA}"
            fi
          fi

          make ci-build IMAGE="$IMAGE" CACHE="$CACHE" REF_NAME="$REF_NAME" SHA="$SHA" VERSION="$VERSION"
