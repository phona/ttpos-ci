name: Build

on:
  repository_dispatch:
    types: [build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: true

      - name: Read CI env
        id: env
        run: |
          if make ci-env > /dev/null 2>&1; then
            make ci-env >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        if: steps.env.outputs.GO_VERSION != ''
        with:
          go-version: ${{ steps.env.outputs.GO_VERSION }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        env:
          REF_NAME: ${{ github.event.client_payload.ref_name }}
          SHA: ${{ github.event.client_payload.sha }}
        run: make ci-build REF_NAME="$REF_NAME" SHA="$SHA"
