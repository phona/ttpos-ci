name: CI (Flutter)

on:
  repository_dispatch:
    types: [ci-flutter]

concurrency:
  group: ci-${{ github.event.client_payload.source_repo }}-${{ github.event.client_payload.pr_number }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════
  # 初始化：读取源码仓库的 CI 配置
  # ═══════════════════════════════════════════════════
  init:
    runs-on: ubuntu-latest
    outputs:
      flutter_version: ${{ steps.env.outputs.FLUTTER_VERSION }}
      needs_submodules: ${{ steps.env.outputs.NEEDS_SUBMODULES }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: true

      - name: Read CI env
        id: env
        run: |
          if make ci-env > /dev/null 2>&1; then
            make ci-env >> $GITHUB_OUTPUT
          fi

      - name: Create pending statuses
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const payload = context.payload.client_payload;
            const [owner, repo] = payload.source_repo.split('/');
            const checks = ['lint', 'unit-test'];  // sonarqube temp disabled — vm-node04 OOM (sisyphus#433)
            for (const name of checks) {
              await github.rest.repos.createCommitStatus({
                owner, repo,
                sha: payload.sha,
                state: 'pending',
                context: `CI / ${name}`,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }

  # ═══════════════════════════════════════════════════
  # Lint / Unit Test — 并发
  # ═══════════════════════════════════════════════════
  lint:
    needs: [init]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: ${{ needs.init.outputs.needs_submodules == 'true' }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.init.outputs.flutter_version }}

      - name: Symlink .fvm/flutter_sdk → $FLUTTER_ROOT
        # 业务仓 pubspec.yaml / .fvmrc 假设 SDK 在 .fvm/flutter_sdk（fvm 本地约定），
        # CI 用 subosito/flutter-action 装到 $FLUTTER_ROOT；不建软链 dart analyze 直接
        # `pubspec.yaml: SDK path is not valid` exit 1。
        run: |
          mkdir -p .fvm
          ln -sfn "$FLUTTER_ROOT" .fvm/flutter_sdk

      - name: Setup
        run: make ci-setup || true

      - name: Lint
        env:
          BASE_REF: ${{ github.event.client_payload.base_ref }}
        run: make ci-lint BASE_REF="$BASE_REF"

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / lint',
              description: 'Lint ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  unit-test:
    needs: [init]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          submodules: ${{ needs.init.outputs.needs_submodules == 'true' }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.init.outputs.flutter_version }}

      - name: Symlink .fvm/flutter_sdk → $FLUTTER_ROOT
        # 同 lint job：业务仓 pubspec.yaml 假设 SDK 在 .fvm/flutter_sdk。
        run: |
          mkdir -p .fvm
          ln -sfn "$FLUTTER_ROOT" .fvm/flutter_sdk

      - name: Setup
        run: make ci-setup || true

      - name: Unit Tests
        env:
          BASE_REF: ${{ github.event.client_payload.base_ref }}
        run: make ci-unit-test BASE_REF="$BASE_REF"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 3

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / unit-test',
              description: 'Unit Test ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

  # ═══════════════════════════════════════════════════
  # SonarQube
  # ═══════════════════════════════════════════════════
  sonarqube:
    needs: [lint, unit-test]
    if: false  # temp disabled — sonar backend on vm-node04 OOM 拖死 cluster (phona/sisyphus#433). 等 sonar 搬到独立机再恢复
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        with:
          args: >
            -Dproject.settings=sonar-project.properties
            -Dsonar.scm.revision=${{ github.event.client_payload.sha }}
            -Dsonar.pullrequest.key=${{ github.event.client_payload.pr_number }}
            -Dsonar.pullrequest.branch=${{ github.event.client_payload.head_ref }}
            -Dsonar.pullrequest.base=${{ github.event.client_payload.base_ref }}

      - name: Report
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SOURCE_REPO_PAT }}
          script: |
            const p = context.payload.client_payload;
            const [owner, repo] = p.source_repo.split('/');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha: p.sha,
              state,
              context: 'CI / sonarqube',
              description: 'SonarQube ${{ job.status }}',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
